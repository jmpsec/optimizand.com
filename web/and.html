<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.2.3/css/bootstrap.min.css" integrity="sha512-SbiR/eusphKoMVVXysTKG/7VseWii+Y3FdHrt0EpKgpToZeemhqHeZeLWLhJutz/2ut2Vw1uQEj2MbRF+TVBUA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" integrity="sha512-BNaRQnYJYiPSqHHDb58B0yaPfCu+Wgds8Gp/gU33kqBtgNS4tSPHuGibyoeqMV/TJlSKda6FXzoEyYGjTe+vXA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js" integrity="sha512-Qlv6VSKh1gDKGoJbnyA5RMXYcvnpIqhO++MhIM2fStMcGT9i2T//tSwYFlcyoRRDcDZ+TYHpH8azBBCyhpSeqw==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
.container-card {
  position: relative;
  text-align: center;
  color: black;
  height: 295px;
  width: 470px;
}
.container-img {
  border-radius: 25px;
}
#text-name {
  position: absolute;
  top: 100px;
  left: 40px;
}
#text-home1 {
  position: absolute;
  top: 120px;
  left: 40px;
}
#text-home2 {
  position: absolute;
  top: 160px;
  left: 40px;
}
#text-currency {
  position: absolute;
  top: 180px;
  left: 40px;
}
#text-iban {
  position: absolute;
  top: 200px;
  left: 40px;
}
#text-bic {
  position: absolute;
  top: 220px;
  left: 40px;
}
#img-logo {
  width: 10%;
}
body {
  background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(49,128,246,0.6419161414565826) 100%);
}
input[type="text"], #parroquia, #currency {
  background-color: #dfeafd;
}
    </style>
  </head>
  <body>
    <div class="container mt-5">
    <h1 class="mb-4 d-flex align-items-center justify-content-center">
      <img id="img-logo" src="logo-only.png"/> Generador Tarjeta IBAN
    </h1>
    <form>
      <div class="mb-3">
        <label for="cliente" class="form-label">Número de Cliente</label>
        <input type="text" class="form-control" id="cliente">
      </div>
      <div class="mb-3">
        <label for="titular" class="form-label">Titular</label>
        <input type="text" class="form-control" id="titular">
      </div>
      <div class="mb-3">
        <label for="home" class="form-label">Dirección</label>
        <input type="text" class="form-control" id="home">
      </div>
      <div class="mb-3">
        <label for="parroquia" class="form-label">Parroquia</label>
        <select class="form-select" id="parroquia">
          <option value="AD100 CANILLO">AD100 CANILLO</option>
          <option value="AD200 ENCAMP">AD200 ENCAMP</option>
          <option value="AD300 ORDINO">AD300 ORDINO</option>
          <option value="AD400 LA MASSANA">AD400 LA MASSANA</option>
          <option value="AD500 ANDORRA LA VELLA">AD500 ANDORRA LA VELLA</option>
          <option value="AD600 SANT JULIÀ DE LORIÀ">AD600 SANT JULIÀ DE LORIÀ</option>
          <option selected value="AD700 ESCALDES-ENGORDANY">AD700 ESCALDES-ENGORDANY</option>
        </select>
      </div>
      <div class="mb-3">
        <label for="iban" class="form-label">IBAN</label>
        <input type="text" class="form-control" id="iban">
      </div>
      <div class="mb-3">
        <label for="bic" class="form-label">BIC</label>
        <input type="text" class="form-control" id="bic" value="BACAADAD">
      </div>
      <button type="button" class="btn btn-primary" onClick="refresh_card();"><i class="fas fa-retweet"></i> Generar</button>
      <button type="button" class="btn btn-success" onClick="download_card();"><i class="fa-solid fa-download"></i> Descargar</button>
    </form>
    </div>
    <div class="container mt-5 container-card">
      <div id="andbank-card" style="background-color: #11ffee00;">
        <img class="container-img" src="Andbank.png" alt="Andbank" style="width:100%;">
        <div id="text-cliente">123456.001.000</div>
        <div id="text-titular">NAME SURNAME</div>
        <div id="text-home1">CALLE STREET 5, 1-2</div>
        <div id="text-home2">LINE 2 HOME</div>
        <div id="text-home3">AD700 ENGORDANY</div>
        <div id="text-iban">IBAN: ADXXXXXXXXXXXXXXXXXXXXXX</div>
        <div id="text-bic">BIC: BACAADAD</div>
      </div>
    </div>
    <script>
      function refresh_card() {
        document.querySelector('#text-cliente').innerText = document.querySelector('#cliente').value.toUpperCase();
        document.querySelector('#text-titular').innerText = document.querySelector('#titular').value.toUpperCase();
        document.querySelector('#text-home1').innerText = document.querySelector('#home').value.toUpperCase();
        document.querySelector('#text-home2').innerText = document.querySelector('#parroquia').value.toUpperCase();
        document.querySelector('#text-home3').innerText = document.querySelector('#parroquia').value.toUpperCase();
        document.querySelector('#text-iban').innerText = 'IBAN: ' + document.querySelector('#iban').value.toUpperCase();
        document.querySelector('#text-bic').innerText = 'BIC: ' + document.querySelector('#swift').value.toUpperCase();
      }
      function download_card() {
        html2canvas(document.querySelector("#andbank-card")).then(canvas => {
          canvas.toBlob(function(blob) {
            window.saveAs(blob, 'andbank.png');
          });
        });
      }
    </script>
  </body>
</html>
